<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komad Marcenaria</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <!-- Substitua pelo logo real da empresa -->
            <span class="logo-text">KOMAD</span>
        </div>

        <ul class="nav-links">
            <li><a href="#">Início</a></li>
            <li><a href="#">Projetos</a></li>
            <li><a href="#">Contato</a></li>
        </ul>

        <div class="hamburger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Seção do Carrossel -->
    <section class="projects-carousel">
        <div class="carousel-container">
            <h2 class="section-title">Nossos Projetos em MDF</h2>
            <p class="section-subtitle">Trabalho artesanal com excelência e durabilidade</p>

            <div class="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="img/cozinha.jpeg" alt="Cozinha">
                        <div class="carousel-caption">
                            <h3>Cozinha</h3>
                            <p>Design moderno feito na cor pimenta do reino</p>
                        </div>
                    </div>

                    <div class="carousel-item">
                        <img src="img/quarto.jpeg" alt="Bancada">
                        <div class="carousel-caption">
                            <h3>Quarto</h3>
                            <p>Bancada feito na cor freijó e painel na cor branco tx</p>
                        </div>
                    </div>

                    <div class="carousel-item">
                        <img src="img/cadeiras.jpeg" alt="Bancos">
                        <div class="carousel-caption">
                            <h3>Bancos</h3>
                            <p>Bancos feito na cor freijó</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="carousel-controls">
                <button class="prev-btn">&lt;</button>
                <div class="indicators"></div>
                <button class="next-btn">&gt;</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
